<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Saanvika Premier League</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 1024px) {
            .admin-grid { grid-template-columns: 1fr 1fr; }
        }
        .match-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .match-item .header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .score-input-group {
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: space-between;
        }
        .score-input {
            width: 60px;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            text-align: center;
            font-weight: bold;
        }
        .player-name-admin {
            flex: 1;
            font-weight: 500;
        }
        .actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-dim);
        }
        .logout-btn:hover {
            border-color: #ff4d4d;
            color: #ff4d4d;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <h1>Admin Dashboard</h1>
            <button id="logoutBtn" class="btn logout-btn btn-small">Logout</button>
        </header>

        <div class="admin-grid">
            <section>
                <div class="card">
                    <h2>Tournament Controls</h2>
                    <p style="color: var(--text-dim); margin-bottom: 1.5rem;">Manage the lifecycle of the tournament.</p>
                    <button id="generateBtn" class="btn btn-primary" style="width: 100%;">Regenerate Bracket (Reset All)</button>
                </div>

                <div class="card" style="margin-top: 2rem;">
                    <h2>Registered Participants</h2>
                    <div id="participantList" style="max-height: 500px; overflow-y: auto;">Loading...</div>
                </div>
            </section>

            <section>
                <div class="card">
                    <h2>Match Scoring</h2>
                    <p style="color: var(--text-dim); margin-bottom: 1.5rem;">Update live scores and advance winners.</p>
                    <div style="margin-bottom: 1rem;">
                        <select id="categoryFilter" class="btn btn-small" style="background: rgba(255,255,255,0.05); width: 100%; text-align: left;">
                            <option value="Men's Singles">Men's Singles</option>
                            <option value="Men's Doubles">Men's Doubles</option>
                            <option value="Mixed Doubles">Mixed Doubles</option>
                        </select>
                    </div>
                    <div id="activeMatches" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Loaded via JS -->
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="toast" class="toast">Tournament Generated Successfully!</div>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        });
    </script>
    <script src="admin.js"></script>
</body>
</html>
